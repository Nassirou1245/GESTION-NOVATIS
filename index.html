<style>
:root{
  --bg:#f4f7f5;--panel:#fff;--panel2:#f9fbfa;--ink:#17211b;--muted:#60716a;--line:#d8e2dc;
  --green:#1f6b4a;--green2:#164b35;--mint:#dff3e9;--blue:#2563eb;--bluebg:#dbeafe;
  --amber:#b7791f;--amberbg:#fff4d7;--red:#b42318;--redbg:#fee4df;--purple:#6d28d9;
  --shadow:0 4px 18px rgba(21,38,30,.07);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Segoe UI,Arial,sans-serif;display:grid;grid-template-columns:276px 1fr;min-height:100vh}
aside{background:#102418;color:#eef8f1;padding:18px 12px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{display:flex;gap:12px;align-items:center;padding:8px 10px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.mark{width:42px;height:42px;border-radius:8px;background:#2f8b61;display:grid;place-items:center;font-weight:900;font-size:18px}
.brand h1{font-size:15px;line-height:1.2;margin:0;font-weight:800}.brand p{font-size:11px;margin:4px 0 0;color:#adc0b5}
.navGroup{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:#90a397;margin:16px 10px 6px}
.navBtn{width:100%;border:0;background:transparent;color:#c7d9ce;text-align:left;border-radius:8px;padding:10px 12px;margin:2px 0;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px}
.navBtn:hover,.navBtn.active{background:#1b3f2c;color:#fff}
.navBadge{margin-left:auto;background:#295b3f;color:#dff3e9;border-radius:99px;padding:2px 7px;font-size:11px;font-weight:700}
.sync{margin:16px 10px 4px;font-size:12px;color:#adc0b5;display:flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:99px;background:#71827a;flex-shrink:0}
.dot.ok{background:#22c55e}.dot.warn{background:#f59e0b}.dot.err{background:#ef4444}
main{min-width:0}
header{min-height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0 24px;position:sticky;top:0;z-index:10}
header h2{font-size:17px;margin:0}header small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
.hActions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
button,.fileBtn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:8px;padding:8px 12px;font-weight:700;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px}
button:hover{border-color:#b8c8bf}
button.primary{background:var(--green);border-color:var(--green);color:#fff}
button.primary:hover{background:var(--green2)}
button.danger{background:var(--redbg);border-color:#f4b8b1;color:var(--red)}
button.sm{padding:5px 9px;font-size:12px;min-height:28px}
.hidden{display:none!important}
.panel{background:#fff;border-bottom:1px solid var(--line);padding:16px 24px}
.page{display:none;padding:20px 24px 40px}.page.active{display:block}
.grid{display:grid;gap:12px}.stats{grid-template-columns:repeat(4,minmax(140px,1fr));margin-bottom:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}
.stat{padding:16px}.stat span{display:block;color:var(--muted);font-size:12px;font-weight:600}
.stat strong{font-size:22px;display:block;margin:6px 0 2px;font-weight:800}
.stat small{display:block;color:var(--muted);font-size:11px}

.sectionHead h3{font-size:15px;margin:0}.sectionHead p{margin:3px 0 0;color:var(--muted);font-size:12px}
.tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input.search,.search{min-width:200px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;background:#fff}
.tableWrap{overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid var(--line);padding:10px 12px;text-align:left;white-space:nowrap}
th{background:var(--panel2);color:#536259;font-size:12px;font-weight:700}
tr:hover td{background:#fbfdfb}
.badge{display:inline-flex;border-radius:99px;padding:3px 9px;font-size:12px;font-weight:800;background:#edf2ef;color:#405047}
.badge.ok{background:var(--mint);color:var(--green2)}.badge.warn{background:var(--amberbg);color:var(--amber)}.badge.err{background:var(--redbg);color:var(--red)}.badge.blue{background:var(--bluebg);color:var(--blue)}
.empty{padding:28px;text-align:center;color:var(--muted)}
.modalBack{position:fixed;inset:0;background:rgba(16,24,20,.44);display:none;align-items:center;justify-content:center;padding:16px;z-index:20}
.modalBack.show{display:flex}
.modal{background:#fff;border-radius:10px;width:min(820px,100%);max-height:94vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,.22)}
.modal header{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2}
.modal h3{margin:0;font-size:15px;font-weight:800}
.modal form,.modal .formBody{padding:18px}
.formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.field.full{grid-column:1/-1}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font:inherit;background:#fff}
.modal footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid var(--line);position:sticky;bottom:0;background:#fff}
.form{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.form input,.form select{border:1px solid var(--line);border-radius:8px;padding:9px 10px;font:inherit;background:#fff;min-width:260px}
.barList{padding:14px 16px}.barRow{display:grid;grid-template-columns:130px 1fr 90px;gap:10px;align-items:center;margin:9px 0;font-size:13px}
.track{height:9px;background:#e8eee9;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--green);border-radius:99px}
.alert{padding:11px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px}
.alert:last-child{border-bottom:0}.alert b{font-size:13px}.alert span{display:block;color:var(--muted);font-size:12px;margin-top:2px}

.receipt{font-size:12px;padding:14px 18px}
.receipt table{width:100%;border-collapse:collapse}.receipt th,.receipt td{padding:5px 6px;border:1px solid #ccc}
.receipt .r-logo{font-weight:900;font-size:16px;text-align:center;background:#102418;color:#fff;padding:10px}
.receipt .r-title{font-weight:900;font-size:15px;text-align:center;background:#1e3a5f;color:#fff}
.receipt .r-section{background:#d4e8f7;font-weight:700;font-size:11px}
.receipt .r-label{color:#536259;font-size:11px}.receipt .r-amount{text-align:right;font-weight:700}
.receipt .r-total{font-weight:900;background:#f0f4f0}.receipt .r-sign{height:42px;font-size:11px;color:#536259;vertical-align:top;padding-top:5px}
.receipt .r-footer{text-align:center;font-size:10px;color:#60716a;margin-top:8px;border-top:1px solid #ccc;padding-top:6px}
/* Print */
@media print{
  aside,header,.sectionHead .tools,.hActions{display:none!important}
  body{display:block}main{padding:0}.page,.page.active{display:block;padding:0}
  .modalBack{position:static;background:none;padding:0}.modal{box-shadow:none;max-height:none}
}
@media(max-width:900px){
  body{grid-template-columns:1fr}aside{height:auto;position:relative}
  .stats{grid-template-columns:repeat(2,1fr)}.formGrid{grid-template-columns:1fr}
  header{position:relative}.page,.panel{padding:14px}

<script>
// ── LOCK SCREEN LOGIC ──
const PASS_ADMIN = '1234';
const PASS_BOSS  = '0000';
let lockRole = 'admin';
let appRole  = null;

function setLockRole(r){
  lockRole = r;
  document.getElementById('tabAdmin').classList.toggle('active', r==='admin');
  document.getElementById('tabBoss').classList.toggle('active',  r==='boss');
  document.getElementById('lockInput').value = '';
  document.getElementById('lockError').textContent = '';
  document.getElementById('lockInput').focus();
}

function tryUnlock(){
  const pass = document.getElementById('lockInput').value;
  const ok = (lockRole==='admin' && pass===PASS_ADMIN) ||
             (lockRole==='boss'  && pass===PASS_BOSS);
  if(ok){
    appRole = lockRole;
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('appAside').style.display = '';
    document.getElementById('appMain').style.display = '';
    // Show config only for admin
    if(appRole==='admin'){
      document.getElementById('setup').style.display = '';
    }
    // Show role badge in sidebar
    document.getElementById('roleBadgeWrap').innerHTML = appRole==='admin'
      ? '<div class="role-badge admin">👑 Administrateur</div>'
      : '<div class="role-badge boss">👁 Direction — Lecture seule</div>';
    // Start app
    initClient();
    loadAll();
  } else {
    document.getElementById('lockError').textContent = '❌ Mot de passe incorrect';
    document.getElementById('lockInput').value = '';
    document.getElementById('lockInput').focus();
  }
}

function lockApp(){
  appRole = null;
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('appAside').style.display = 'none';
  document.getElementById('appMain').style.display = 'none';
  document.getElementById('lockInput').value = '';
  document.getElementById('lockError').textContent = '';
  setLockRole('admin');
}

function isAdmin(){ return appRole === 'admin'; }

document.getElementById('lockInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') tryUnlock();
});
setTimeout(()=>document.getElementById('lockInput').focus(), 100);
</script>

  if(declared) return declared;
  const latestByDay = {};
  moves.forEach(m => {
    const d = m.caissedate || String(m.dateheure||'').slice(0,10);
    if(!d) return;
    if(!latestByDay[d] || String(m.dateheure||'') >= String(latestByDay[d].dateheure||'')) latestByDay[d] = m;
  });
  return Object.values(latestByDay).reduce((a,m)=>a+n(m.soldeapres),0);
}


/* ─── NAVIGATION ─── */
function renderNav(){
  const groups = {};
  TABLES.forEach(t => (groups[t[2]] ||= []).push(t));

  TABLES.forEach(t => counts[t[0]] = (rows[t[0]]||[]).length);

      `<div class="navGroup">${esc(g)}</div>` +
      items.map(t => `<button class="navBtn ${current===t[0]?'active':''}" onclick="navigate('${t[0]}')">${esc(t[1])}<span class="navBadge">${counts[t[0]]||0}</span></button>`).join('')
    ).join('');
}

async function loadAll(){
  if(!client){ setSyncState('warn','Mode local'); renderDashboard(); renderNav(); return; }
  setSyncState('warn','Chargement…');
  for(const [id] of TABLES){
    const {data,error} = await client.from(id).select('*').order('id',{ascending:false}).limit(2000);
    rows[id] = error ? [] : (data||[]);
  }
  setSyncState('ok','Supabase synchronisé');
  render();
}

function navigate(id){
  current = id; searchVal = '';
  el('dashboard').classList.toggle('active', id==='dashboard');
  el('tablePage').classList.toggle('active', id!=='dashboard');
  render();
}

/* ─── DASHBOARD ─── */
function stat(label,value,note){ return `<div class="card stat"><span>${esc(label)}</span><strong>${esc(String(value))}</strong><small>${esc(note||'')}</small></div>`; }

function bars(items){
  const max = Math.max(1,...items.map(i=>i.value));
  return items.map(i=>`<div class="barRow"><b>${esc(i.label)}</b><div class="track"><div class="fill" style="width:${Math.min(100,Math.round(i.value/max*100))}%"></div></div><span>${i.suffix?Math.round(i.value)+i.suffix:money(i.value)}</span></div>`).join('');
}

function renderDashboard(){
  const inv = rows.inventaire||[], loyers = rows.loyers||[], revenus = rows.revenus||[];
  const depenses = rows.depenses||[], caisse = rows.caisse||[], cashMoves = rows.mouvements_caisse||[];
  const banque = rows.mouvements_banque||[];
  const occupied = inv.filter(isOccupied).length;
  const vacant = inv.filter(isVacant).length;
  const rentPaid = loyers.reduce((a,r)=>a+n(r.paye),0);
  const rentDue = loyers.reduce((a,r)=>a+n(r.montant),0);
  const rentUnpaid = loyers.reduce((a,r)=>a+n(r.solde),0);
  const other = revenus.filter(r=>r.statut!=='Annule').reduce((a,r)=>a+n(r.montant),0);
  const out = depenses.reduce((a,r)=>a+n(r.montant),0);
  const cash = cashTotal(caisse, cashMoves);
  const bank = banque.reduce((a,r)=>a+n(r.entree)-n(r.sortie),0);
  const recouvrement = rentDue ? Math.round(rentPaid/rentDue*100) : 0;

  el('pageTitle').textContent = 'Tableau de bord';
  el('pageSub').textContent = 'Pilotage web app — Centre Commercial Madina';
  el('dashboard').innerHTML = `
    <div class="grid stats">
      ${stat('Espaces totaux', inv.length, 'Inventaire')}
      ${stat('Espaces occupés', occupied, 'Loués')}
      ${stat('Espaces vacants', vacant, 'Potentiel')}
      ${stat('Taux occupation', (inv.length?Math.round(occupied/inv.length*100):0)+'%', 'Centre commercial')}
    </div>
    <div class="grid stats">
      ${stat('Revenus loyers', money(rentPaid), 'Encaissements')}
      ${stat('Autres recettes', money(other), 'Annexes')}
      ${stat('Total dépenses', money(out), 'Sorties')}
      ${stat('Solde net', money(rentPaid+other-out), 'Résultat')}

    <div class="grid stats">
      ${stat('Cash caisse', money(cash), 'Cash déclaré')}
      ${stat('Solde banque', money(bank), 'Mouvements banque')}
      ${stat('Impayés loyers', money(rentUnpaid), 'À recouvrer')}
      ${stat('Taux recouvrement', recouvrement+'%', 'Paiements/Appels')}

      <div class="card"><div class="sectionHead"><h3>Répartition financière</h3></div><div class="barList">${bars([

    </div>`;
}

function kpi(label,value,color){
  return `<div style="text-align:center"><div style="font-size:11px;color:#60716a;font-weight:700;text-transform:uppercase;letter-spacing:.04em">${label}</div><div style="font-size:16px;font-weight:900;color:${color}">${value}</div></div>`;
}

async function saveJustification(caisseId){
  if(!client) return;
  const val = (el('justifInput')?.value||'').trim();
  if(!val){showToast('Saisissez une justification','err');return}
  const {error} = await client.from('caisse').update({justificationecart:val}).eq('id',caisseId);
  if(error){showToast(error.message,'err');return}
  showToast('Justification enregistrée');
  await loadAll();
  const c = (rows.caisse||[]).find(r=>r.id===caisseId);
  if(c) openCaisseJournal(c.date, caisseId);
}

async function closeCaisseSafe(caisseId, fromModal=false){
  if(!client) return;
  const c = (rows.caisse||[]).find(r=>r.id===caisseId);
  if(!c){showToast('Caisse introuvable','err');return}
  if(n(c.ecart)!==0 && !(c.justificationecart||'').trim()){
    showToast('Écart détecté — justifiez avant de clôturer','err');
    openCaisseJournal(c.date, caisseId);
    return;
  }
  const {error} = await client.from('caisse').update({statut:'Cloture'}).eq('id',caisseId);
  if(error){showToast(error.message,'err');return}
  await auditLog('Clôture caisse','caisse','Caisse du '+c.date+' — écart '+money(c.ecart));
  showToast('Caisse clôturée');
  if(fromModal) closeModal();
  await loadAll();
}

        <td style="white-space:nowrap">
          ${current==='paiements'?`<button class="sm" onclick="openReceipt('${esc(r.id)}')">Reçu</button> `:''}
          ${current==='mouvements_caisse'?`<button class="sm" onclick="openCaisseJournal('${esc(r.caissedate||'')}','')">Voir caisse</button> `:''}
          ${client?`<button class="sm" onclick="openForm('${meta[0]}','${esc(r.id)}')">Modifier</button>`:'Lecture seule'}
        </td>
      </tr>`).join('')||`<tr><td colspan="${fields.length+1}" class="empty">Aucune donnée.</td></tr>`}
      </tbody></table></div>
    </div>`;
  el('tableSearch').addEventListener('input', e=>{ searchVal=e.target.value; renderTable(); });
}

/* ─── FORMULAIRE GÉNÉRIQUE ─── */
function openForm(table, id=''){
  if(!client){showToast('Configurez Supabase d\'abord','err');return}
  const meta = tableMeta(table);
  const record = (rows[table]||[]).find(r=>r.id===id)||{};
  const fields = meta[3].filter(f=>f!=='id');
  const isDate = f => f==='date'||f==='datepaiement'||f==='datedebut'||f==='datefin';
  const isMemo = f => f==='notes'||f==='details'||f==='description'||f==='justificationecart';
  el('modal').innerHTML = `
    <header><h3>${id?'Modifier':'Ajouter'} — ${esc(meta[1])}</h3><button onclick="closeModal()">Fermer</button></header>
    <form id="editForm"><div class="formGrid" style="padding:18px">
    ${fields.map(f=>{
      const full = isMemo(f)||f==='libelle'||f==='adresse';
      if(isMemo(f)) return `<div class="field full"><label>${esc(lbl(f))}</label><textarea name="${esc(f)}" rows="2">${esc(record[f]??'')}</textarea></div>`;
      const typ = isDate(f)?'date': f==='mois'?'month': MONEY_FIELDS.has(f)?'number':'text';
      return `<div class="field ${full?'full':''}"><label>${esc(lbl(f))}</label><input name="${esc(f)}" type="${typ}" value="${esc(record[f]??'')}"></div>`;
    }).join('')}
    </div>
    <footer><button type="button" onclick="closeModal()">Annuler</button><button class="primary">Enregistrer</button></footer></form>`;
  el('modalBack').classList.add('show');
  el('editForm').onsubmit = async e => {
    e.preventDefault();
    const payload = {};
    fields.forEach(f => {
      const el2 = e.target.elements[f];
      payload[f] = MONEY_FIELDS.has(f) ? n(el2.value) : el2.value;
    });
    const result = id
      ? await client.from(table).update(payload).eq('id',id)
      : await client.from(table).insert(payload);
    if(result.error){
      showToast('Erreur: '+result.error.message,'err');
      console.error('Save error:', result.error);
      return;
    }
    await auditLog(id?'Modification':'Création', table, meta[1]+' '+( payload.reference||payload.date||id||''));
    showToast('Enregistré');
    closeModal(); await loadAll();
  };
}

function closeModal(){ el('modalBack').classList.remove('show'); }

/* ─── AUDIT ─── */
async function auditLog(action, module, details){
  if(!client) return;
  await client.from('audit').insert({date:new Date().toISOString().slice(0,16),action,module,utilisateur:'Admin',details});
}

/* ─── TOAST ─── */
function showToast(msg, type='ok'){
  let t = el('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:8px;font-weight:700;font-size:13px;z-index:999;transition:opacity .3s'; document.body.appendChild(t); }
  t.style.background = type==='err'?'#b42318':'#1f6b4a';
  t.style.color = '#fff'; t.style.opacity='1';
  t.textContent = msg;
  clearTimeout(t._t); t._t = setTimeout(()=>t.style.opacity='0',3000);
}

/* ─── IMPORT JSON LEGACY ─── */
function cleanPayload(table, row){
  const meta = tableMeta(table); if(!meta) return null;
  const allowed = new Set(['id',...meta[3]]);
  const out = {};
  Object.entries(row||{}).forEach(([k,v])=>{
    const key = FIELD_MAP[k] || k.toLowerCase();
    if(key==='id' && !/^[0-9a-f]{8}-[0-9a-f]{4}/.test(String(v||''))) return;
    if(allowed.has(key)) out[key] = MONEY_FIELDS.has(key)?n(v):v;
  });
  if(table==='caisse'){
    out.soldetheorique = n(out.soldetheorique)||n(out.soldeouverture)+n(out.entrees)-n(out.sorties);
    out.ecart = n(out.ecart)||n(out.cashreel)-n(out.soldetheorique);
  }
  return out;
}

async function importLegacyJson(file){
  if(!client){showToast('Connectez Supabase d\'abord','err');return}
  const text = await file.text();
  let parsed; try{parsed=JSON.parse(text)}catch{showToast('JSON invalide','err');return}
  const db = parsed.db || parsed.state?.db || parsed;
  if(!db||typeof db!=='object'){showToast('Format non reconnu','err');return}
  let total=0;
  for(const [legacyName,legacyRows] of Object.entries(db)){
    const table = LEGACY_MAP[legacyName]||legacyName;
    if(!tableMeta(table)||!Array.isArray(legacyRows)||!legacyRows.length) continue;
    const payload = legacyRows.map(r=>cleanPayload(table,r)).filter(Boolean);
    if(!payload.length) continue;
    const {error} = await client.from(table).upsert(payload,{onConflict:'id'});
    if(error){showToast('Erreur '+table+': '+error.message,'err');return}
    total += payload.length;
  }
  showToast('Import terminé : '+total+' lignes');
  await loadAll();
}

/* ─── RENDER PRINCIPAL ─── */
function render(){
  renderNav();
  if(current==='dashboard') renderDashboard();
  else if(current==='caisse') renderCaisse();
  else renderTable();
}

/* ─── INIT & EVENTS ─── */
function initClient(){
  const cfg = config();
  // Populate fields if they exist
  const urlEl = el('supabaseUrl'), anonEl = el('supabaseAnon');
  if(urlEl) urlEl.value = cfg.url||'';
  if(anonEl) anonEl.value = cfg.anon||'';
  
  if(cfg.url && cfg.anon && window.supabase){
    try{
      const url = cfg.url.trim();
      const key = cfg.anon.trim();
      client = window.supabase.createClient(url, key, {
        auth: { persistSession: true, autoRefreshToken: true }
      });
      setSyncState('ok','Supabase connecté');
    } catch(e){
      setSyncState('err','Erreur: '+e.message);
      client = null;
    }
  } else {
    client = null;
    setSyncState('warn','Mode local — configurez Supabase');
  }
}

function setSyncState(cls,text){
  el('syncDot').className='dot '+cls;
  el('syncText').textContent=text;
}

el('saveConfigBtn').onclick = async()=>{
  localStorage.setItem(CONFIG_KEY,JSON.stringify({url:el('supabaseUrl').value.trim(),anon:el('supabaseAnon').value.trim()}));
  initClient(); await loadAll();
};
el('testConfigBtn').onclick = async()=>{
  initClient();
  if(!client){showToast('Configuration manquante','err');return}
  try{
    const {data,error}=await client.from('inventaire').select('id').limit(1);
    if(error){
      showToast('Erreur: '+error.message,'err');
      console.error('Supabase error:', error);
    } else {
      showToast('Connexion Supabase OK ✅');
      await loadAll();
    }
  } catch(e){
    showToast('Erreur connexion: '+e.message,'err');
    console.error('Connection error:', e);
  }
};
el('loginBtn').onclick = async()=>{
  initClient();
  const email=prompt('Email');
  const password=prompt('Mot de passe');
  if(!email||!password)return;
  const {error}=await client.auth.signInWithPassword({email,password});
  if(error) showToast(error.message,'err');
  else{el('loginBtn').classList.add('hidden');el('logoutBtn').classList.remove('hidden');await loadAll();}
};
el('logoutBtn').onclick = async()=>{if(client)await client.auth.signOut();location.reload()};
el('modalBack').onclick = e=>{if(e.target.id==='modalBack')closeModal()};
el('importJson').onchange = e=>{if(e.target.files[0])importLegacyJson(e.target.files[0])};

window.navigate=navigate;window.openForm=openForm;window.closeModal=closeModal;
window.openCaisseJournal=openCaisseJournal;window.openCaisseForm=openCaisseForm;
window.closeCaisseSafe=closeCaisseSafe;window.saveJustification=saveJustification;
window.openReceipt=openReceipt;window.loadAll=loadAll;

// initClient and loadAll called after login
