<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#102418">
  <meta name="description" content="Gestion Centre Commercial Madina - NOVATIS GLOBAL">
  <title>Madina — NOVATIS</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Madina ERP">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <aside>
    <div class="brand">
      <div class="mark">M</div>
      <div>
        <h1>Centre Commercial Madina</h1>
        <p>NOVATIS GLOBAL</p>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="sync" id="syncState">
      <span class="dot" id="syncDot"></span>
      <span id="syncText">Initialisation…</span>
    </div>
  </aside>

  <main>
    <header>
      <div>
        <h2 id="pageTitle">Tableau de bord</h2>
        <small id="pageSub">Pilotage web app</small>
      </div>
      <div class="hActions">
        <button id="loginBtn">Connexion</button>
        <button id="logoutBtn" class="hidden">Sortir</button>
      </div>
    </header>

    <section id="setup" class="panel">
      <h3 style="margin:0 0 6px">Connexion Supabase</h3>
      <p style="margin:0 0 12px;font-size:13px">Collez les informations du projet Supabase. Elles restent dans ce navigateur.</p>
      <div class="form">
        <input id="supabaseUrl" placeholder="https://votre-projet.supabase.co" style="min-width:300px">
        <input id="supabaseAnon" placeholder="anon public key" style="min-width:300px">
        <button id="saveConfigBtn" class="primary">Enregistrer</button>
        <button id="testConfigBtn">Tester</button>
        <label class="fileBtn" style="cursor:pointer;font-weight:700;font-size:13px">
          📂 Importer JSON (ancien système)
          <input id="importJson" type="file" accept="application/json,.json" hidden>
        </label>
      </div>
    </section>

    <section id="dashboard" class="page active"></section>
