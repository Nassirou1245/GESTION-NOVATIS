  <style>
    :root{

    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,Segoe UI,Arial,sans-serif}

</head>

function friendlyId(moduleId,row=null){
  const prefix=ID_PREFIX[moduleId]||moduleId.slice(0,3).toUpperCase();
  const rows=moduleRows(moduleId);

  let n=rows.reduce((max,r)=>{
    const match=String(r.id||'').match(new RegExp('^'+prefix+'-(\\d+)$'));
    return match?Math.max(max,Number(match[1])):max;
  },0)+1;

}

function duplicateMessage(moduleId,data,rowId=''){

  if(moduleId==='paiements' && rows.some(r=>same(r.reference,data.reference)))return 'Doublon: ce numero de recu existe deja.';
  if(moduleId==='locataires' && rows.some(r=>same(r.nom,data.nom)||same(r.telephone,data.telephone)))return 'Doublon: meme locataire ou meme telephone.';
  if(moduleId==='inventaire' && rows.some(r=>same(r.codeEspace,data.codeEspace)||same(r.idInventaire,data.idInventaire)))return 'Doublon: meme espace ou meme ID inventaire.';

  }[moduleId]||[];
  const missing=requiredFields(moduleId).filter(k=>data[k]===undefined||data[k]===null||String(data[k]).trim()==='');
  if(missing.length)return 'Champs obligatoires manquants ou invalides: '+missing.join(', ');
  const invalidMoney=positiveMoney.filter(k=>n(data[k])<=0);
  if(invalidMoney.length)return 'Montant obligatoire invalide: '+invalidMoney.join(', ');
  return duplicateMessage(moduleId,data,rowId);
}

function sum(rows,key){return rows.reduce((a,r)=>a+n(r[key]),0)}
function normalizeSpaceType(value){
  return ['Boutique','Conteneur','Table','Kiosque','Autre'].includes(value)?value:'Autre';

function migrateState(data){
  if(Array.isArray(data.db.documents) && data.db.documents.length){
    data.db.archives = Array.isArray(data.db.archives) && data.db.archives.length ? data.db.archives : data.db.documents;
  }
  delete data.db.boutiques;
  delete data.db.achats;
  delete data.db.ventes;
  delete data.db.fournisseurs;
  delete data.db.maintenance;
  delete data.db.incidents;
  delete data.db.documents;
  (data.db.inventaire||[]).forEach(r=>r.typeEspace=normalizeSpaceType(r.typeEspace));
  (data.db.paiements||[]).forEach(r=>r.typeEspace=normalizeSpaceType(r.typeEspace));
  data.updatedAt=data.updatedAt||new Date().toISOString();
}
function rentKey(code,month){return String(code||'').trim()+'|'+String(month||'').trim()}
function rentStatus(row){
  if(n(row.montant)<=0)return 'Impaye';
  if(n(row.solde)<=0)return 'Paye';
  if(n(row.paye)>0)return 'Partiel';
  return String(row.mois||'')<monthNow()?'En retard':'Impaye';
}
function recalculateAll(){
  repairIds();
  const paymentsByRent={};
  moduleRows('paiements').forEach(p=>{
    p.typeEspace=normalizeSpaceType(p.typeEspace);
    ['loyer','arrieres','penalites','fraisSecurite','fraisAssainissement','autres','montant'].forEach(k=>p[k]=n(p[k]));
    if(p.source==='Loyer' && p.statut!=='Annule'){
      const key=rentKey(p.boutiqueCode,p.periode);
      paymentsByRent[key]=(paymentsByRent[key]||0)+n(p.montant);
    }
  });
  moduleRows('inventaire').forEach(r=>{
    r.typeEspace=normalizeSpaceType(r.typeEspace);
    r.loyerMensuel=n(r.loyerMensuel);
    r.loyerAuto=r.loyerMensuel;
  });
  moduleRows('loyers').forEach(r=>{
    const paidFromReceipts=paymentsByRent[rentKey(r.boutiqueCode,r.mois)];
    r.montant=n(r.montant);
    r.paye=paidFromReceipts!==undefined?paidFromReceipts:n(r.paye);
    r.solde=Math.max(0,r.montant-r.paye);
    r.statut=rentStatus(r);
  });
  rebuildCashMovements();
  rebuildBankMovements();
  moduleRows('caisse').forEach(c=>{
    const day=String(c.date||'');
    const movements=moduleRows('mouvementsCaisse').filter(m=>m.caisseDate===day && m.type!=='Ouverture');
    c.entrees=sum(movements,'entree');
    c.sorties=sum(movements,'sortie');
    c.soldeTheorique=n(c.soldeOuverture)+n(c.entrees)-n(c.sorties);
    c.ecart=n(c.cashReel)-n(c.soldeTheorique);
    c.statut=c.statut==='Cloture'?'Cloture':c.ecart===0?'Conforme':'Ecart a justifier';
  });
}

function isBankMode(mode){return /virement|cheque|banque/i.test(String(mode||''))}
function bankName(mode, fallback='Banque'){return isBankMode(mode)?String(mode||fallback):fallback}

  const generated=[];
  const add=(row)=>generated.push({

    justificatif:row.justificatif||row.reference||'',
    notes:row.notes||''
  });

function badge(v){
  const s=String(v||'');
  let cls='';
  if(/paye|confirme|actif|conforme|complet|resolu|clos|bon|occupee|validee/i.test(s))cls='ok';
  else if(/partiel|suivi|prepare|en cours|a|moyen|normal|reservee/i.test(s))cls='warn';
  else if(/impaye|retard|critique|urgent|eleve|ecart|expire|rejetee|annule|suspendu|incident/i.test(s))cls='err';
  else if(/libre|info|prospect/i.test(s))cls='blue';
  return `<span class="badge ${cls}">${esc(s||'-')}</span>`;
}

function openForm(moduleId,rowId=''){
  if(!requireAdmin('modifier les donnees'))return;
  const mod=MODULE_MAP[moduleId], rows=moduleRows(moduleId), row=rows.find(r=>r.id===rowId)||{id:''};
  if(moduleId==='audit'){toast('Le journal audit est en lecture seule');return}
  const modal=document.getElementById('modal');
  modal.innerHTML=`<header><h3>${rowId?'Modifier':'Ajouter'} - ${esc(mod.title)}</h3><button class="btn sm" onclick="closeModal()">Fermer</button></header>

  document.getElementById('editForm').addEventListener('submit',async e=>{

        }else data[f[0]]=f[2]==='money'||f[2]==='number'?n(el.value):el.value;
      }
    }catch(err){toast(err.message);return}
    const error=validateRecord(moduleId,data,rowId);
    if(error){toast(error);return}
    const idx=rows.findIndex(r=>r.id===rowId);
    const action=idx>=0?'Modification':'Creation';
    if(idx>=0)rows[idx]=data;else rows.push(data);

  });

function readFileData(file){
  return new Promise((resolve,reject)=>{
    if(file.size>1024*1024*2){reject(new Error('Document trop volumineux. Maximum conseille: 2 Mo.'));return}
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=()=>reject(new Error('Lecture du fichier impossible'));
    reader.readAsDataURL(file);
  });
}
function fieldHtml(f,value){
  const [key,label,type,opts]=f, full=type==='textarea'||type==='url';
  if(type==='textarea')return `<div class="field full"><label>${esc(label)}</label><textarea name="${key}" rows="3">${esc(value||'')}</textarea></div>`;
  if(type==='file')return `<div class="field full"><label>${esc(label)}</label>${value?`<p><a href="${esc(value)}" download>Telecharger le document actuel</a></p>`:''}<input name="${key}" type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg,.webp"></div>`;
  if(type==='select')return `<div class="field"><label>${esc(label)}</label><select name="${key}">${String(opts||'').split('|').map(o=>`<option ${o==value?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
  const inputType=type==='money'?'number':type;
  return `<div class="field ${full?'full':''}"><label>${esc(label)}</label><input name="${key}" type="${inputType}" value="${esc(value??defaultValue(type,key))}"></div>`;
}

  const loyers=moduleRows('loyers').filter(r=>r.mois===month);
  const payments=moduleRows('paiements').filter(p=>String(p.periode||'')===month&&p.statut!=='Annule');
  const expenses=moduleRows('depenses').filter(d=>String(d.date||'').startsWith(month));
  const revenues=moduleRows('revenus').filter(r=>String(r.date||'').startsWith(month)&&r.statut!=='Annule');
  const rent=payments.length?sum(payments.filter(p=>p.source==='Loyer'),'montant'):sum(loyers,'paye');
  const other=sum(revenues,'montant')+sum(payments.filter(p=>p.source!=='Loyer'),'montant');
  const out=sum(expenses,'montant');
  const unpaid=sum(loyers,'solde');
  return {rent,other,expenses:out,unpaid,net:rent+other-out,loyers};
}

function appScriptCode(){
  const headers=Object.fromEntries(MODULES.map(m=>[m.id,['id',...m.fields.map(f=>f[0])]]));
  return `const TABLES = ${JSON.stringify(TABLES)};\nconst HEADERS = ${JSON.stringify(headers,null,2)};\n\nfunction doGet(e) {\n  try {\n    const action = (e.parameter.action || 'loadAll');\n    if (action === 'ping') return output_({ ok: true, message: 'Backend Madina actif', at: new Date().toISOString() }, e);\n    if (action === 'loadAll') return output_({ ok: true, db: loadAll_() }, e);\n    return output_({ ok: false, error: 'Action inconnue' }, e);\n  } catch (err) { return output_({ ok: false, error: String(err.message || err) }, e); }\n}\n\nfunction doPost(e) {\n  try {\n    const body = JSON.parse((e.postData && e.postData.contents) || '{}');\n    if (body.action === 'saveAll') { saveAll_(body.db || {}); return output_({ ok: true, savedAt: new Date().toISOString() }, e); }\n    if (body.action === 'loadAll') return output_({ ok: true, db: loadAll_() }, e);\n    return output_({ ok: false, error: 'Action inconnue' }, e);\n  } catch (err) { return output_({ ok: false, error: String(err.message || err) }, e); }\n}\n\nfunction ss_() {\n  const ss = SpreadsheetApp.getActiveSpreadsheet();\n  if (!ss) throw new Error('Ouvrez le script depuis un Google Sheet.');\n  return ss;\n}\nfunction saveAll_(db) { const ss = ss_(); TABLES.forEach(name => write_(ss, name, Array.isArray(db[name]) ? db[name] : [])); meta_(ss); }\nfunction loadAll_() { const ss = ss_(); const db = {}; TABLES.forEach(name => db[name] = read_(ss, name)); return db; }\nfunction write_(ss, name, rows) {\n  const sh = ss.getSheetByName(name) || ss.insertSheet(name);\n  const headers = HEADERS[name]; sh.clearContents();\n  sh.getRange(1, 1, 1, headers.length).setValues([headers]).setFontWeight('bold').setBackground('#1f6b4a').setFontColor('#ffffff');\n  if (rows.length) sh.getRange(2, 1, rows.length, headers.length).setValues(rows.map(r => headers.map(h => encode_(r[h]))));\n  sh.setFrozenRows(1); sh.autoResizeColumns(1, headers.length);\n}\nfunction read_(ss, name) {\n  const sh = ss.getSheetByName(name); if (!sh || sh.getLastRow() < 2) return [];\n  const values = sh.getDataRange().getValues(); const headers = values.shift();\n  return values.filter(r => r.some(c => c !== '')).map(row => { const obj = {}; headers.forEach((h, i) => obj[h] = decode_(row[i])); return obj; });\n}\nfunction encode_(v) { return v === null || v === undefined ? '' : typeof v === 'object' ? JSON.stringify(v) : v; }\nfunction decode_(v) { if (v === '') return ''; if (typeof v !== 'string') return v; const t = v.trim(); if ((t[0] === '{' && t[t.length - 1] === '}') || (t[0] === '[' && t[t.length - 1] === ']')) { try { return JSON.parse(t); } catch (err) {} } return v; }\nfunction meta_(ss) { const sh = ss.getSheetByName('_meta') || ss.insertSheet('_meta'); sh.clearContents(); sh.getRange(1, 1, 2, 2).setValues([['cle','valeur'], ['lastSync', new Date().toISOString()]]); }\nfunction output_(payload, e) { const callback = e && e.parameter && e.parameter.callback; const text = callback ? callback + '(' + JSON.stringify(payload) + ')' : JSON.stringify(payload); return ContentService.createTextOutput(text).setMimeType(callback ? ContentService.MimeType.JAVASCRIPT : ContentService.MimeType.JSON); }`;
}

function importExcel(file){
  if(!requireAdmin('importer des donnees'))return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const doc=new DOMParser().parseFromString(reader.result,'text/html');
      const db={};TABLES.forEach(t=>db[t]=[]);
      doc.querySelectorAll('h2[data-sheet]').forEach(h=>{
        const id=h.dataset.sheet;
        const table=h.nextElementSibling;
        if(!MODULE_MAP[id]||!table)return;
        const headers=Array.from(table.querySelectorAll('thead th')).map(th=>th.textContent.trim());
        db[id]=Array.from(table.querySelectorAll('tbody tr')).map(tr=>{
          const obj={};Array.from(tr.children).forEach((td,i)=>obj[headers[i]]=td.textContent);return obj;
        }).filter(r=>Object.values(r).some(v=>String(v||'').trim()));
      });
      state.db=ensureDbTables(db);
      migrateState(state);
      audit('Import','systeme','Excel','Import Excel compatible');
      save();
      render();
      toast('Import Excel termine');
    }catch(e){toast('Import Excel impossible : '+e.message)}
  };
  reader.readAsText(file);
}

function ensureDbTables(db){TABLES.forEach(t=>{if(!Array.isArray(db[t]))db[t]=[]});return db}
function dbSignature(db){
  const normalizeRow=row=>Object.keys(row||{}).sort().map(k=>[k,String(row[k]??'')]);
  return TABLES.map(t=>{
    const rows=Array.isArray(db[t])?db[t]:[];
    return t+':'+rows.length+':'+rows.map(r=>JSON.stringify(normalizeRow(r))).sort().join('|');
  }).join(';');
}
function delay(ms){return new Promise(resolve=>setTimeout(resolve,ms))}
async function loadSheets(){
  const url=(localStorage.getItem(URL_KEY)||document.getElementById('sheetsUrl')?.value||'').trim();
  if(!url){navigate('settings');toast("Configurez d'abord l'URL Apps Script");return}
  try{
    const res=await jsonp(url+'?action=loadAll');
    if(!res.ok||!res.db)throw new Error(res.error||'reponse backend non valide');
    state.db=ensureDbTables(res.db);
    migrateState(state);
    save(true,false);
    render();
    toast('Donnees chargees depuis Google Sheets');
  }catch(e){toast('Chargement Sheets echoue : '+e.message)}
}
async function syncSheets(manual=true){
  if(!requireAdmin('synchroniser Google Sheets'))return;
  const url=localStorage.getItem(URL_KEY);
  if(!url){navigate('settings');toast("Configurez d'abord l'URL Apps Script");return}
  try{
    syncing=true;renderSyncInfo('Synchronisation en cours');
    recalculateAll();
    const expected=dbSignature(state.db);
    await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'saveAll',db:state.db})});
    await delay(1600);
    const check=await jsonp(url+'?action=loadAll');
    if(!check.ok||!check.db)throw new Error(check.error||'verification impossible');
    const actual=dbSignature(check.db);
    if(actual!==expected)throw new Error('les donnees relues ne correspondent pas encore aux donnees locales');
    state.updatedAt=new Date().toISOString();
    localStorage.setItem(STORE,JSON.stringify(state));
    localStorage.setItem(LAST_SYNC_KEY,new Date().toISOString());
    localStorage.setItem(LAST_SYNC_STATUS_KEY,'ok');
    syncing=false;renderSyncInfo('Google Sheets a jour');
    if(manual)toast('Synchronisation Google Sheets confirmee');
  }catch(e){
    localStorage.setItem(LAST_SYNC_STATUS_KEY,'error');
    syncing=false;renderSyncInfo('Sync a verifier');
    toast('Sync non confirmee : '+e.message);
  }
}
function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb='madina_cb_'+Date.now();const sep=url.includes('?')?'&':'?';
    const s=document.createElement('script');const timer=setTimeout(()=>{cleanup();reject(new Error('delai depasse'))},12000);
    window[cb]=data=>{cleanup();resolve(data)};s.onerror=()=>{cleanup();reject(new Error('reseau ou URL invalide'))};
    function cleanup(){clearTimeout(timer);delete window[cb];s.remove()}
    s.src=url+sep+'callback='+cb;document.body.appendChild(s);
  });
}

    ['Lecture seule boss',typeof canEdit==='function'&&DEFAULT_VIEWER_PASS==='0000'&&DEFAULT_PASS==='1234'],
    ['Encodage propre',!new RegExp('[\\u00c3\\u00f0\\u00e2\\u00c2]').test(document.body.innerText)],
    ['Google Sheets config',typeof syncSheets==='function'&&typeof loadSheets==='function']
  ];
  const failed=checks.filter(c=>!c[1]).map(c=>c[0]);

function checkLock(){
  const unlocked=sessionStorage.getItem(ADMIN_KEY)==='1' && !!sessionStorage.getItem(ROLE_KEY);

function unlock(){
  const pass=document.getElementById('lockPassword').value.trim();
  const adminPass=localStorage.getItem(PASS_KEY)||DEFAULT_PASS;
  const viewerPass=localStorage.getItem(VIEWER_PASS_KEY)||DEFAULT_VIEWER_PASS;
  if(pass===adminPass||pass===DEFAULT_PASS){sessionStorage.setItem(ADMIN_KEY,'1');sessionStorage.setItem(ROLE_KEY,'admin');document.getElementById('lockScreen').classList.remove('show');render();toast('Acces admin deverrouille')}
  else if(pass===viewerPass||pass===DEFAULT_VIEWER_PASS){sessionStorage.setItem(ADMIN_KEY,'1');sessionStorage.setItem(ROLE_KEY,'viewer');document.getElementById('lockScreen').classList.remove('show');render();toast('Acces lecteur deverrouille')}
  else toast('Mot de passe incorrect');
}
function resetAccess(){
  localStorage.setItem(PASS_KEY,DEFAULT_PASS);
  localStorage.setItem(VIEWER_PASS_KEY,DEFAULT_VIEWER_PASS);
  sessionStorage.removeItem(ADMIN_KEY);
  sessionStorage.removeItem(ROLE_KEY);
  document.getElementById('lockPassword').value='';
  checkLock();
  toast('Acces reinitialise: admin 1234, lecteur 0000');
}
